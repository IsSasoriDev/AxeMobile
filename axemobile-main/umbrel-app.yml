releaseNotes: >-
  v1.4.0 — Premium polish update.


  • Refined "premium dark minimal" UI across the entire app — sidebar,
    mobile navigation, page headers, cards, dialogs and buttons.

  • New live Logs viewer in Settings for real-time app diagnostics.

  • Safer data controls — Reset App and Clear Cache now ask for
    confirmation so you can no longer wipe your saved miners by accident.

  • Smarter miner discovery with editable saved IP addresses and clearer
    in-app error reporting for unreachable devices.

  • Smoother page transitions and balanced motion throughout.

  • Cleaner Umbrel build pipeline for faster, more reliable updates.
