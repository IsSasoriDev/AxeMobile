releaseNotes: >-
  v1.4.1 — Umbrel package rebuild.


  • Rebuilt the Umbrel Docker image from a clean, deterministic package using
    npm ci, the repository lockfile, and a hardened Nginx static server.

  • Fixed the broken build context so the lockfile and required production
    files are included correctly.

  • Reworked the GitHub workflow to validate the Umbrel app folder, build
    multi-architecture images, and publish the latest container package.

  • Added a container health check and SPA-safe Nginx routing for direct page
    refreshes inside Umbrel.

  • Kept the premium dark minimal UI, live Logs viewer, and safer Settings
    reset confirmations from the previous update.

  • Includes the AxeMobile store icon and screenshot gallery for the Umbrel
    store listing.
