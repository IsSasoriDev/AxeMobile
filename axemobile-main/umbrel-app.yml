manifestVersion: 1
id: axemobile-main
category: bitcoin
name: AxeMobile
version: "1.4.1"
tagline: Monitor Bitaxe and NerdAxe miners from Umbrel
description: >-
  AxeMobile is a premium dark dashboard for monitoring and managing your
  Bitaxe and NerdAxe Bitcoin miners directly from Umbrel.


  Features:

  - Real-time hashrate, temperature & power monitoring

  - Multi-miner discovery via local network scanning

  - Pool configuration & performance presets

  - Over-the-air firmware updates

  - Bitcoin network stats & blocks explorer

  - Block probability calculator & resource hub

  - Achievement system & gamified mining cave

  - Live in-app logs & diagnostics


  Quick Start:

  1. Install AxeMobile from your Umbrel App Store.

  2. Add your miner IPs or scan your local network.

  3. Monitor hashrate, temperature, and efficiency in real-time.
